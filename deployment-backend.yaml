apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: wbitt/network-multitool
          command: ["sleep", "3600"]
          ports:
            - containerPort: 8080
          env:
            - name: HTTP_PORT
              value: "8080"
